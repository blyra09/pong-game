<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #000;
            color: #fff;
            text-align: center;
            font-family: Arial;
        }
        canvas {
            background: #000;
            border: 2px solid #fff;
            display: block;
            margin: 20px auto;
        }
        #score {
            font-size: 32px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>PONG GAME</h1>
    <div id="score">Player: <span id="p1">0</span> | AI: <span id="p2">0</span></div>
    <canvas id="canvas" width="800" height="400"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let p1Score = 0, p2Score = 0;
        
        const ball = { x: 400, y: 200, size: 8, dx: 5, dy: 5 };
        const paddle1 = { x: 10, y: 150, w: 10, h: 100 };
        const paddle2 = { x: 780, y: 150, w: 10, h: 100 };
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 800, 400);
            
            ctx.fillStyle = '#fff';
            ctx.fillRect(paddle1.x, paddle1.y, paddle1.w, paddle1.h);
            ctx.fillRect(paddle2.x, paddle2.y, paddle2.w, paddle2.h);
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function update() {
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            if (ball.y < 0 || ball.y > 400) ball.dy *= -1;
            
            if (ball.x < paddle1.x + paddle1.w && ball.y > paddle1.y && ball.y < paddle1.y + paddle1.h) ball.dx *= -1;
            if (ball.x > paddle2.x && ball.y > paddle2.y && ball.y < paddle2.y + paddle2.h) ball.dx *= -1;
            
            if (ball.x < -10) {
                p2Score++;
                ball.x = 400;
                ball.y = 200;
            }
            if (ball.x > 810) {
                p1Score++;
                ball.x = 400;
                ball.y = 200;
            }
            
            const ai = paddle2.y + paddle2.h / 2;
            if (ai < ball.y - 30) paddle2.y += 4;
            else if (ai > ball.y + 30) paddle2.y -= 4;
            
            document.getElementById('p1').innerText = p1Score;
            document.getElementById('p2').innerText = p2Score;
        }
        
        document.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            paddle1.y = Math.max(0, Math.min(300, e.clientY - rect.top - 50));
        });
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
    </script>
</body>
</html>

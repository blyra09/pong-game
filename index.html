<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Pong Game</title>\n    <style>\n        canvas {\n            background: black;\n            display: block;\n            margin: auto;\n        }\n    </style>\n</head>\n<body>\n    <canvas id="pong" width="800" height="400"></canvas>\n    <script>\n        const canvas = document.getElementById('pong');\n        const context = canvas.getContext('2d');\n\n        const user = {\n            x: 0,\n            y: (canvas.height - 100) / 2,\n            width: 10,\n            height: 100,\n            color: 'WHITE',\n            score: 0\n        };\n\n        const computer = {\n            x: canvas.width - 10,\n            y: (canvas.height - 100) / 2,\n            width: 10,\n            height: 100,\n            color: 'WHITE',\n            score: 0\n        };\n\n        const ball = {\n            x: canvas.width / 2,\n            y: canvas.height / 2,\n            radius: 10,\n            speed: 5,\n            velocityX: 5,\n            velocityY: 5,\n            color: 'WHITE'\n        };\n\n        function drawRect(x, y, w, h, color) {\n            context.fillStyle = color;\n            context.fillRect(x, y, w, h);\n        }\n\n        function drawArc(x, y, radius, color) {\n            context.fillStyle = color;\n            context.beginPath();\n            context.arc(x, y, radius, 0, Math.PI * 2, false);\n            context.closePath();\n            context.fill();\n        }\n\n        function draw() {\n            drawRect(0, 0, canvas.width, canvas.height, 'BLACK');\n            drawRect(user.x, user.y, user.width, user.height, user.color);\n            drawRect(computer.x, computer.y, computer.width, computer.height, computer.color);\n            drawArc(ball.x, ball.y, ball.radius, ball.color);\n        }\n\n        function update() {\n            ball.x += ball.velocityX;\n            ball.y += ball.velocityY;\n\n            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {\n                ball.velocityY = -ball.velocityY;\n            }\n            const userCollision = ball.x - ball.radius < user.x + user.width && ball.y > user.y && ball.y < user.y + user.height;\n            const computerCollision = ball.x + ball.radius > computer.x && ball.y > computer.y && ball.y < computer.y + computer.height;\n\n            if (userCollision) {\n                ball.velocityX = -ball.velocityX;            }\n            if (computerCollision) {\n                ball.velocityX = -ball.velocityX;            }\n\n            if (ball.x - ball.radius < 0) {\n                computer.score++; // Computer scored\n                resetBall();\n            } else if (ball.x + ball.radius > canvas.width) {\n                user.score++; // User scored\n                resetBall();\n            }\n        }\n\n        function resetBall() {\n            ball.x = canvas.width / 2;\n            ball.y = canvas.height / 2;\n            ball.velocityX = -ball.velocityX;\n        }\n\n        function game() {\n            draw();\n            update();\n        }\n\n        setInterval(game, 1000 / 60);\n    </script>\n</body>\n</html>
